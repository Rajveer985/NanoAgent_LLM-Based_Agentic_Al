<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <style>
    body {
      background-color: #0f172a;
      color: #e2e8f0;
      font-family: sans-serif;
      margin: 0;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: #0f172a;
    }

    ::-webkit-scrollbar-thumb {
      background: #334155;
      border-radius: 10px;
    }

    .header {
      background: #1e293b;
      padding: 15px;
      border-bottom: 1px solid #334155;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .logo-box {
      background: linear-gradient(to top right, #06b6d4, #2563eb);
      border-radius: 8px;
      width: 30px;
      height: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      color: white;
    }

    .header-title {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header-text {
      margin: 0;
      font-size: 16px;
      font-weight: bold;
      line-height: 1;
    }

    .header-sub {
      margin: 0;
      font-size: 10px;
      color: #22d3ee;
      font-family: monospace;
      letter-spacing: 1px;
    }

    .input-area {
      padding: 15px;
      background: rgba(30, 41, 59, 0.3);
      border-bottom: 1px solid #334155;
      flex-shrink: 0;
    }

    textarea {
      width: 100%;
      box-sizing: border-box;
      background: #020617;
      border: 1px solid #334155;
      color: #e2e8f0;
      border-radius: 10px;
      padding: 10px;
      font-size: 13px;
      resize: none;
      outline: none;
    }

    textarea:focus {
      border-color: #06b6d4;
    }

    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 10px 0;
      padding: 0 5px;
    }

    .checkbox-lbl {
      font-size: 12px;
      color: #94a3b8;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .settings-link {
      font-size: 12px;
      color: #60a5fa;
      text-decoration: none;
      font-weight: bold;
    }

    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      font-weight: bold;
      color: white;
      cursor: pointer;
      font-size: 13px;
      letter-spacing: 1px;
    }

    .btn-run {
      background: linear-gradient(to right, #2563eb, #0891b2);
    }

    .btn-stop {
      background: linear-gradient(to right, #dc2626, #db2777);
      display: none;
    }

    #log {
      flex: 1;
      padding: 15px;
      overflow-y: auto;
      background: rgba(15, 23, 42, 0.5);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .msg-wrapper {
      display: flex;
      flex-direction: column;
      width: 100%;
    }

    .msg {
      padding: 10px 15px;
      border-radius: 15px;
      font-size: 13px;
      max-width: 90%;
      word-wrap: break-word;
    }

    .msg-user {
      background: rgba(37, 99, 235, 0.3);
      border: 1px solid rgba(59, 130, 246, 0.3);
      color: #dbeafe;
      border-top-left-radius: 0;
      align-self: flex-start;
    }

    .msg-ai {
      background: rgba(8, 145, 178, 0.2);
      border: 1px solid rgba(6, 182, 212, 0.3);
      color: #cffafe;
      border-top-right-radius: 0;
      align-self: flex-end;
    }

    .msg-err {
      background: rgba(127, 29, 29, 0.4);
      border: 1px solid rgba(239, 68, 68, 0.5);
      color: #fca5a5;
      font-weight: bold;
      text-align: center;
      align-self: center;
    }

    .msg-debug {
      font-family: monospace;
      font-size: 11px;
      color: #64748b;
      padding-left: 10px;
      border-left: 2px solid #334155;
      margin-top: -5px;
      align-self: flex-start;
    }

    .msg-card {
      background: #1e293b;
      border-left: 4px solid #22c55e;
      color: #dcfce7;
      font-size: 12px;
      margin-top: 5px;
      align-self: flex-start;
    }

    .empty-state {
      text-align: center;
      color: #475569;
      font-family: monospace;
      font-size: 12px;
      margin-top: 40px;
      letter-spacing: 2px;
    }
  </style>
</head>

<body>
  <div class="header">
    <div class="header-title">
      <div class="logo-box">N</div>
      <div>
        <p class="header-text">NanoAgent</p>
        <p class="header-sub">v1.1</p>
      </div>
    </div>
  </div>
  <div class="input-area">
    <textarea id="prompt" rows="3" placeholder="e.g. Open three stock tabs OR Paste this into Excel..."></textarea>
    <div class="toolbar">
      <label class="checkbox-lbl"><input type="checkbox" id="show-boxes" checked> Vision DOM</label>
      <a href="options.html" target="_blank" class="settings-link">⚙️ Providers</a>
    </div>
    <button id="run" class="btn btn-run">INITIALIZE AGENT</button>
    <button id="stop" class="btn btn-stop">ABORT MISSION</button>
  </div>
  <div id="log">
    <div class="empty-state">AWAITING DIRECTIVE...</div>
  </div>
  <script src="sidepanel.js"></script>
</body>

</html>
