<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NanoAgent Command Center</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #1a1a2e;
            --bg-secondary: #16213e;
            --bg-tertiary: #0f3460;
            --accent-blue: #4a9eff;
            --accent-green: #2ecc71;
            --accent-red: #e74c3c;
            --accent-orange: #f39c12;
            --text-primary: #eaeaea;
            --text-secondary: #a0a0b0;
            --text-muted: #6c6c7e;
            --bubble-user: #4a9eff;
            --bubble-system: #2d2d44;
            --bubble-status: #1e1e32;
            --bubble-result: #1a3a2a;
            --border-color: #2a2a40;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, var(--bg-secondary) 0%, var(--bg-tertiary) 100%);
            padding: 18px 24px;
            border-bottom: 1px solid var(--border-color);
            flex-shrink: 0;
        }

        .header h1 {
            font-size: 1.4rem;
            font-weight: 600;
            letter-spacing: 0.3px;
            margin-bottom: 2px;
        }

        .header .subtitle {
            font-size: 0.85rem;
            color: var(--text-secondary);
            font-weight: 400;
        }

        /* Connection Status Bar */
        .status-bar {
            background: var(--bg-secondary);
            padding: 10px 24px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            gap: 24px;
            align-items: center;
            flex-shrink: 0;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.8rem;
            color: var(--text-secondary);
            transition: color 0.3s ease;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--text-muted);
            transition: background 0.3s ease, box-shadow 0.3s ease;
            flex-shrink: 0;
        }

        .status-dot.online {
            background: var(--accent-green);
            box-shadow: 0 0 6px rgba(46, 204, 113, 0.4);
        }

        .status-dot.offline {
            background: var(--accent-red);
            box-shadow: 0 0 6px rgba(231, 76, 60, 0.4);
        }

        .status-dot.checking {
            background: var(--accent-orange);
            animation: pulse 1.2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* Chat Area */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px 24px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            scroll-behavior: smooth;
        }

        .chat-container::-webkit-scrollbar {
            width: 6px;
        }

        .chat-container::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-container::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 3px;
        }

        /* Messages */
        .message-wrapper {
            display: flex;
            width: 100%;
            animation: fadeInUp 0.3s ease forwards;
        }

        .message-wrapper.user {
            justify-content: flex-end;
        }

        .message-wrapper.system {
            justify-content: flex-start;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message-bubble {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 14px;
            font-size: 0.9rem;
            line-height: 1.5;
            word-wrap: break-word;
            position: relative;
        }

        .message-bubble .timestamp {
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-top: 6px;
            display: block;
        }

        .message-bubble.user {
            background: var(--bubble-user);
            color: #fff;
            border-bottom-right-radius: 4px;
        }

        .message-bubble.user .timestamp {
            color: rgba(255,255,255,0.6);
        }

        .message-bubble.system {
            background: var(--bubble-system);
            color: var(--text-primary);
            border-bottom-left-radius: 4px;
        }

        .message-bubble.status {
            background: var(--bubble-status);
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
            border-bottom-left-radius: 4px;
            font-style: italic;
        }

        .message-bubble.result {
            background: var(--bubble-result);
            color: #d4f8d4;
            border: 1px solid rgba(46, 204, 113, 0.25);
            border-bottom-left-radius: 4px;
        }

        .message-bubble.error {
            background: #3a1a1a;
            color: #ff9999;
            border: 1px solid rgba(231, 76, 60, 0.3);
            border-bottom-left-radius: 4px;
        }

        /* Input Area */
        .input-area {
            background: var(--bg-secondary);
            border-top: 1px solid var(--border-color);
            padding: 14px 24px;
            display: flex;
            gap: 12px;
            align-items: center;
            flex-shrink: 0;
        }

        .input-area input {
            flex: 1;
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 12px 16px;
            color: var(--text-primary);
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s ease;
        }

        .input-area input:focus {
            border-color: var(--accent-blue);
        }

        .input-area input::placeholder {
            color: var(--text-muted);
        }

        .input-area input:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .input-area button {
            background: var(--accent-blue);
            color: #fff;
            border: none;
            border-radius: 10px;
            padding: 12px 22px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s ease, transform 0.1s ease;
            flex-shrink: 0;
        }

        .input-area button:hover:not(:disabled) {
            background: #3a8eef;
        }

        .input-area button:active:not(:disabled) {
            transform: scale(0.97);
        }

        .input-area button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Footer */
        .footer {
            background: var(--bg-secondary);
            text-align: center;
            padding: 6px 24px;
            font-size: 0.7rem;
            color: var(--text-muted);
            border-top: 1px solid var(--border-color);
            flex-shrink: 0;
        }

        /* Typing indicator */
        .typing-dots {
            display: inline-flex;
            gap: 4px;
            align-items: center;
            height: 16px;
        }

        .typing-dots span {
            width: 5px;
            height: 5px;
            background: var(--text-muted);
            border-radius: 50%;
            animation: typingBounce 1.4s infinite ease-in-out both;
        }

        .typing-dots span:nth-child(1) { animation-delay: -0.32s; }
        .typing-dots span:nth-child(2) { animation-delay: -0.16s; }

        @keyframes typingBounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
    </style>
</head>
<body>
    <header class="header">
        <h1>NanoAgent Command Center</h1>
        <div class="subtitle">Three-System Integration Demo</div>
    </header>

    <div class="status-bar">
        <div class="status-item" id="status-nanobridge">
            <div class="status-dot checking" id="dot-nanobridge"></div>
            <span id="text-nanobridge">NanoBridge: Checking...</span>
        </div>
        <div class="status-item" id="status-middleware">
            <div class="status-dot checking" id="dot-middleware"></div>
            <span id="text-middleware">Middleware: Checking...</span>
        </div>
    </div>

    <div class="chat-container" id="chat-container"></div>

    <div class="input-area">
        <input type="text" id="message-input" placeholder="Type a command for NanoAgent..." autocomplete="off">
        <button id="send-btn">Send</button>
    </div>

    <footer class="footer">
        NanoAgent v7.57
    </footer>

    <script>
        const chatContainer = document.getElementById('chat-container');
        const messageInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');

        let isWaiting = false;
        let pollInterval = null;
        let timeoutTimer = null;
        let currentStatusBubble = null;

        const NANOBRIDGE_URL = 'http://localhost:3000';
        const MIDDLEWARE_URL = 'http://localhost:3001';

        function formatTime(date) {
            return date.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
        }

        function createMessageBubble(text, type) {
            const wrapper = document.createElement('div');
            wrapper.className = `message-wrapper ${type === 'user' ? 'user' : 'system'}`;

            const bubble = document.createElement('div');
            bubble.className = `message-bubble ${type}`;
            bubble.innerHTML = text;

            const timestamp = document.createElement('span');
            timestamp.className = 'timestamp';
            timestamp.textContent = formatTime(new Date());
            bubble.appendChild(timestamp);

            wrapper.appendChild(bubble);
            chatContainer.appendChild(wrapper);
            scrollToBottom();
            return bubble;
        }

        function updateStatusBubble(bubble, text, newType) {
            if (!bubble) return;
            bubble.className = `message-bubble ${newType}`;
            bubble.innerHTML = text;
            const timestamp = document.createElement('span');
            timestamp.className = 'timestamp';
            timestamp.textContent = formatTime(new Date());
            bubble.appendChild(timestamp);
            scrollToBottom();
        }

        function scrollToBottom() {
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function setWaiting(waiting) {
            isWaiting = waiting;
            sendBtn.disabled = waiting;
            messageInput.disabled = waiting;
            if (!waiting) {
                messageInput.focus();
            }
        }

        function clearPolling() {
            if (pollInterval) {
                clearInterval(pollInterval);
                pollInterval = null;
            }
            if (timeoutTimer) {
                clearTimeout(timeoutTimer);
                timeoutTimer = null;
            }
        }

        async function sendMessage() {
            const text = messageInput.value.trim();
            if (!text || isWaiting) return;

            messageInput.value = '';
            createMessageBubble(escapeHtml(text), 'user');
            setWaiting(true);

            // Show initial status
            currentStatusBubble = createMessageBubble(
                'Sent to pipeline... waiting for NanoAgent',
                'status'
            );

            const chatId = 'demo-' + Date.now();

            try {
                const response = await fetch(`${MIDDLEWARE_URL}/webhook/open-webui`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: text,
                        chat_id: chatId,
                        user: 'demo-user'
                    })
                });

                if (!response.ok) {
                    throw new Error(`Webhook returned ${response.status}`);
                }

                // Start polling for result
                startPolling();

                // Set timeout
                timeoutTimer = setTimeout(() => {
                    clearPolling();
                    updateStatusBubble(
                        currentStatusBubble,
                        'Request timed out. NanoAgent may be offline or the pipeline is stalled.',
                        'error'
                    );
                    setWaiting(false);
                }, 30000);

            } catch (err) {
                clearPolling();
                updateStatusBubble(
                    currentStatusBubble,
                    'Failed to send: ' + escapeHtml(err.message),
                    'error'
                );
                setWaiting(false);
            }
        }

        function startPolling() {
            pollInterval = setInterval(async () => {
                try {
                    const res = await fetch(`${NANOBRIDGE_URL}/api/task/result`);
                    const data = await res.json();

                    if (data.status === 'complete') {
                        clearPolling();
                        updateStatusBubble(
                            currentStatusBubble,
                            escapeHtml(data.result || 'Task completed.'),
                            'result'
                        );
                        setWaiting(false);
                    } else if (data.status === 'processing') {
                        updateStatusBubble(
                            currentStatusBubble,
                            'NanoAgent is executing the task...',
                            'status'
                        );
                    } else if (data.status === 'idle') {
                        // Keep waiting until timeout kicks in
                    }
                } catch (err) {
                    // Polling error - keep trying until timeout
                }
            }, 3000);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Event listeners
        sendBtn.addEventListener('click', sendMessage);
        messageInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        // Connection status checking
        async function checkConnection(url, dotId, textId, name) {
            const dot = document.getElementById(dotId);
            const text = document.getElementById(textId);

            dot.className = 'status-dot checking';
            text.textContent = `${name}: Checking...`;

            try {
                const controller = new AbortController();
                const timeout = setTimeout(() => controller.abort(), 5000);
                const res = await fetch(url, { signal: controller.signal });
                clearTimeout(timeout);

                if (res.ok) {
                    dot.className = 'status-dot online';
                    text.textContent = `${name}: Connected`;
                } else {
                    throw new Error('Not OK');
                }
            } catch {
                dot.className = 'status-dot offline';
                text.textContent = `${name}: Offline`;
            }
        }

        function checkAllConnections() {
            checkConnection(`${NANOBRIDGE_URL}/api/whatsapp-qr`, 'dot-nanobridge', 'text-nanobridge', 'NanoBridge');
            checkConnection(`${MIDDLEWARE_URL}/health`, 'dot-middleware', 'text-middleware', 'Middleware');
        }

        // Initial check and interval
        checkAllConnections();
        setInterval(checkAllConnections, 10000);

        // Focus input on load
        messageInput.focus();
    </script>
</body>
</html>
